site_name: AI Factory Engineering
site_description: AI Factory 工程：从应用到 GPU 基础设施
site_author: king ye
site_url: https://kingye.me/ai-factory-engineering/
repo_name: ai-factory-engineering
repo_url: https://github.com/ikingye/ai-factory-engineering
exclude_docs: |
  codex-handoff.md
theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
plugins:
  - search
nav:
